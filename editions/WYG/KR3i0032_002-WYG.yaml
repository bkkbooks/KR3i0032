body:
  text: 夏月佛頂菊五六月開色微紅後序菊之開也既黄白深淺之不同而花有落者有不落者蓋花瓣結宻者不落盛開之後淺黄者轉白而白色者漸轉紅枯于枝上花瓣扶疎者多落盛開之後漸覺離披遇風雨撼之則飄散滿地矣王介甫武夷詩云黄昏風雨打園林殘菊飄零滿地金歐陽永叔見之戲介甫曰秋花不落春花落為報詩人子細看介甫聞之笑曰歐陽九不學之過也豈不見楚辭云夕餐秋菊之落英東坡歐公門人也其詩亦有欲伴騷人賦落英與夫却繞東籬嗅落英亦用楚辭語耳王彦賓言古人之言有不必盡循者如楚辭言秋菊落英之語余謂詩人所以多識草木之名蓋為是也歐王二公文章擅一世而左右佩紉彼此相笑豈非於草木之名猶有未盡識之而不知有落有不落者耶王彦賓之徒又從而為之贅疣蓋益遠矣若夫可餐者乃菊之初開芳馨可愛耳若夫衰謝而後落豈復有可餐之味楚辭之過乃在於此或云詩之訪落落訓始也意落英之落蓋謂始開之花耳然則介甫之引證殆亦未之思歟或者之說不為無據余學為老圃而頗識草木者因併書于菊譜之後淳熈嵗次乙未閏九月望日吳門老圃叙史氏菊譜
