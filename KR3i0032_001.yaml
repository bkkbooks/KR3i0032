body:
  text: 史氏菊譜宋史正志撰菊草屬也以黃為正所以槩稱黃花漢俗九日飲菊酒以祓除不祥蓋九月律中無射而數九俗尚九日而用時之草也南陽酈縣有菊潭飲其水者皆壽神仙傳有康生服其花而成仙菊有黃華北方用以準節令大略黃華開時節候不差江南地暖百卉造作無時而菊獨不然考其理菊性介烈髙潔不與百卉同其盛衰必待霜降草木黃落而花始開嶺南冬至始有微霜故也本草一名日精一名周盈一名傳延年所宜貴者苗可以菜花可以藥囊可以枕釀可以飲所以髙人隱士籬落畦圃之間不可一日無此花也陶淵明植於三徑采於東籬裛露掇英泛以忘憂鍾㑹賦以五美謂圓華髙懸準天極也純黃不雜后土色也早植晚登君子德也冒霜吐頴象徑直也杯中體輕神仙食也其為所重如此然品類有數十種而白菊一二年多有變黃者余在二水植大白菊百餘株次年盡變為黃花今以色之黃白及雜色品類可見於吳門者二十有七種大小顔色殊異而不同自昔好事者為牡丹芍藥海棠竹筍作譜記者多矣獨菊花未有為之譜者殆亦菊花之闕文也歟余姑以所見為之若夫耳目之未接品類之未備更俟博雅君子與我同志者續之今以所見具列于後黃大金黃心密花瓣大如大錢小金黃心微紅花瓣鵝黃葉翠大如衆花佛頭菊無心中邊亦同小佛頭菊同上微小又云疊羅黃金墩菊比佛頭頗瘦花心微窪金鈴菊心微青紅花瓣鵝黃色葉小又云明州黃深色御袍黃心起突色如深鵝黃淺色御袍黃中深金錢菊心小花瓣稀毬子黃中邊一色突起如毬子棣棠菊色深黃如棣棠狀比甘菊差大甘菊色深黃比棣棠頗小野菊細瘦枝柯凋衰多野生亦有白者白金盞銀臺心突起瓣黃四邊白樓子佛頂心大突起似佛頂四邊單葉添色喜容心微突起瓣密且大纒枝菊花瓣薄開過轉紅色玉盤菊黃心突起淡白緣邊單心菊細花心瓣大樓子菊層層狀如樓子萬鈴菊心茸茸突起花多半開者如鈴腦子菊花瓣微皺縮如腦子狀荼䕷菊心青黃微起如鵝黃色淺雜色紅紫十樣菊黃白雜樣亦有微紫花頭小桃花菊花瓣全如桃花秋初先開色有淺深深秋亦有白者芙蓉菊狀如芙蓉亦紅色孩兒菊紫萼白心茸茸然葉上有光與他菊異
