body:
  text: 史氏菊譜宋史正志撰菊草屬也以黄為正所以槩稱黄花漢俗九日飲菊酒以祓除不祥蓋九月律中無射而數九俗尚九日而用時之草也南陽酈縣有菊潭飲其水者皆壽神僊傳有康生服其花而成僊菊有黄華北方用以準節令大畧黄華開時節候不差江南地暖百卉造作無時而菊獨不然攷其理菊性介烈髙潔不與百卉同其盛衰必待霜降草木黄落而花始開嶺南冬至始有微霜故也本草一名日精一名周盈一名傳延年所宜貴者苗可以菜花可以藥囊可以枕釀可以飲所以髙人隱士籬落畦圃之間不可一日無此花也陶淵明植於三徑采於東籬裛露掇英汎以忘憂鍾㑹賦以五美謂圓華髙懸準天極也純黄不雜后土色也早植晩登君子徳也冒霜吐頴象勁直也杯中體輕神僊食也其為所重如此然品類有數十種而白菊一二年多有變黄者余在二水植大白菊百餘株次年盡變為黄花今以色之黄白及雜色品類可見於吳門者二十有七種大小顔色殊異而不同自昔好事者為牡丹芍藥海棠竹筍作譜記者多矣獨菊花未有為之譜者殆亦菊花之闕文也歟余姑以所見為之若夫耳目之未接品類之未備更俟博雅君子與我同志者續之今以所見具列于後黄大金黄心宻花瓣大如大錢小金黄心微紅花瓣鵝黄葉翠大如衆花佛頭菊無心中邊亦同小佛頭菊同上微小又云疊羅黄金墪菊比佛頭頗瘦花心微窪金鈴菊心微青紅花瓣鵝黄色葉小又云明州黄深色御袍黄心起突色如深鵝黄淺色御袍黄中深金錢菊心小花瓣稀毬子黄中邊一色突起如毬子棣棠菊色深黄如棣棠狀比甘菊差大甘菊色深黄比棣棠頗小野菊細瘦枝柯凋衰多野生亦有白者白金盞銀臺心突起瓣黄四邊白樓子佛頂心大突起似佛頂四邊單葉添色喜容心微突起瓣密且大纒枝菊花瓣薄開過轉紅色玉盤菊黄心突起淡白縁邊單心菊細花心瓣大樓子菊層層狀如樓子萬鈴菊心茸茸突起花多半開者如鈴腦子菊花瓣微縐縮如腦子狀荼䕷菊心青黄微起如鵝黄色淺雜色紅紫十様菊黄白雜様亦有微紫花頭小桃花菊花瓣全如桃花秋初先開色有淺深深秋亦有白者芙蓉菊狀如芙蓉亦紅色孩兒菊紫萼白心茸茸然葉上有光與他菊異
